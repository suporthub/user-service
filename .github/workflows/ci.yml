name: ci

on:
  push:
    branches: [main, master, develop]

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy securely over SSH (Direct Build)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /v3/user-service
            
            # Force server to match GitHub exactly, bypassing any local modifications
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # Get short SHA for precise tagging
            export SHA=$(git rev-parse --short HEAD)

            # Build the fresh local image natively (no-cache to ensure updates)
            docker build --no-cache -t user-service:${SHA} .
            
            # Since you're using k3s, save and import it directly into the cluster runtime
            docker save user-service:${SHA} | sudo k3s ctr images import -
            
            # Update the deployment to use the new precise image tag
            kubectl set image deployment/user-service user-service=user-service:${SHA} -n default
